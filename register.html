<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Register - Live Face Verification | VeriChat</title>
    <link rel="stylesheet" href="css/main.css">
    <style>
        .register-container {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .register-card {
            background: white;
            border-radius: 20px;
            max-width: 500px;
            width: 100%;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .camera-wrapper {
            position: relative;
            margin-bottom: 20px;
            border-radius: 15px;
            overflow: hidden;
            background: #000;
        }
        
        #video {
            width: 100%;
            height: auto;
            display: block;
        }
        
        .face-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }
        
        .face-guide {
            width: 200px;
            height: 200px;
            border: 3px solid rgba(255,255,255,0.5);
            border-radius: 50%;
            box-shadow: 0 0 0 999px rgba(0,0,0,0.3);
            transition: border-color 0.3s;
        }
        
        .face-guide.valid {
            border-color: #4CAF50;
            box-shadow: 0 0 0 999px rgba(76,175,80,0.1);
        }
        
        .instruction {
            text-align: center;
            margin: 15px 0;
            color: #666;
            font-size: 0.9rem;
        }
        
        .capture-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin: 10px 0;
            transition: transform 0.2s;
        }
        
        .capture-btn:hover {
            transform: scale(1.02);
        }
        
        .capture-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
        }
        
        .progress-steps {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
        }
        
        .step {
            flex: 1;
            text-align: center;
            position: relative;
        }
        
        .step-number {
            width: 30px;
            height: 30px;
            background: #ddd;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 5px;
            font-weight: bold;
        }
        
        .step.active .step-number {
            background: #667eea;
            color: white;
        }
        
        .step.completed .step-number {
            background: #4CAF50;
            color: white;
        }
        
        .step-label {
            font-size: 0.75rem;
            color: #666;
        }
        
        .step.active .step-label {
            color: #667eea;
            font-weight: bold;
        }
        
        .otp-timer {
            text-align: center;
            margin-top: 10px;
            font-size: 0.85rem;
            color: #666;
        }
        
        .resend-btn {
            background: none;
            border: none;
            color: #667eea;
            cursor: pointer;
            text-decoration: underline;
        }
        
        .status-message {
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            text-align: center;
        }
        
        .status-success {
            background: #c6f6d5;
            color: #22543d;
        }
        
        .status-error {
            background: #fed7d7;
            color: #742a2a;
        }
        
        .status-warning {
            background: #feebc8;
            color: #7b341e;
        }
        
        .hidden {
            display: none;
        }
        
        @media (max-width: 768px) {
            .register-card {
                padding: 20px;
            }
            
            .face-guide {
                width: 150px;
                height: 150px;
            }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-card">
            <div class="progress-steps">
                <div class="step active" id="step1">
                    <div class="step-number">1</div>
                    <div class="step-label">Live Face</div>
                </div>
                <div class="step" id="step2">
                    <div class="step-number">2</div>
                    <div class="step-label">Account</div>
                </div>
                <div class="step" id="step3">
                    <div class="step-number">3</div>
                    <div class="step-label">Verify</div>
                </div>
            </div>
            
            <!-- Step 1: Face Capture -->
            <div id="step1Content">
                <div class="camera-wrapper">
                    <video id="video" autoplay playsinline></video>
                    <div class="face-overlay">
                        <div class="face-guide" id="faceGuide"></div>
                    </div>
                </div>
                <p class="instruction">📸 Position your face in the circle<br>Look straight at the camera</p>
                <button class="capture-btn" id="captureBtn" disabled>Capture Live Face</button>
                <div id="faceStatus" class="status-message hidden"></div>
            </div>
            
            <!-- Step 2: Account Details (Hidden initially) -->
            <div id="step2Content" class="hidden">
                <form id="registerForm">
                    <div class="form-group">
                        <label>📧 Gmail Address</label>
                        <input type="email" id="email" required placeholder="yourname@gmail.com">
                    </div>
                    <div class="form-group">
                        <label>🔐 Recovery Password</label>
                        <input type="password" id="password" required placeholder="Min 6 characters">
                        <small style="color: #666;">Used for account recovery</small>
                    </div>
                    <div class="form-group">
                        <label>👤 Display Name</label>
                        <input type="text" id="displayName" required placeholder="How others see you">
                    </div>
                    <div class="form-group">
                        <label>📱 Phone (Optional)</label>
                        <input type="tel" id="phone" placeholder="+94 XX XXX XXXX">
                    </div>
                    <button type="submit" class="capture-btn">Continue →</button>
                </form>
            </div>
            
            <!-- Step 3: OTP Verification (Hidden initially) -->
            <div id="step3Content" class="hidden">
                <div id="otpMessage" class="status-message status-success">
                    ✓ Verification code sent to your email
                </div>
                <div class="form-group">
                    <label>🔑 Enter OTP Code</label>
                    <input type="text" id="otpCode" placeholder="6-digit code" maxlength="6">
                </div>
                <div class="otp-timer">
                    Code expires in: <span id="timer">10:00</span>
                </div>
                <div class="otp-timer">
                    <button class="resend-btn" id="resendBtn">Resend Code</button>
                </div>
                <button class="capture-btn" id="verifyBtn">Verify & Complete</button>
            </div>
            
            <div id="globalStatus" class="status-message hidden"></div>
            
            <p style="text-align: center; margin-top: 20px; font-size: 0.85rem;">
                Already have an account? <a href="login.html">Login here</a>
            </p>
        </div>
    </div>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.18.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/face-verification.js"></script>
    <script>
        // Registration flow controller
        let capturedFaceDescriptor = null;
        let capturedFaceUrl = null;
        let tempUserId = null;
        let otpTimer = null;
        let timeLeft = 600; // 10 minutes in seconds
        
        const step1Content = document.getElementById('step1Content');
        const step2Content = document.getElementById('step2Content');
        const step3Content = document.getElementById('step3Content');
        const step1 = document.getElementById('step1');
        const step2 = document.getElementById('step2');
        const step3 = document.getElementById('step3');
        const captureBtn = document.getElementById('captureBtn');
        const faceGuide = document.getElementById('faceGuide');
        const faceStatus = document.getElementById('faceStatus');
        
        let video, stream;
        let faceDetectionModel = null;
        
        // Load face detection models
        async function loadFaceModels() {
            const MODEL_URL = 'https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights';
            await faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL);
            await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
            await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
            console.log('Face models loaded');
            startCamera();
        }
        
        // Start camera
        async function startCamera() {
            video = document.getElementById('video');
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        facingMode: 'user',
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    } 
                });
                video.srcObject = stream;
                await video.play();
                startFaceDetection();
            } catch (err) {
                showStatus('Camera access is required for registration', 'error');
                console.error(err);
            }
        }
        
        let detectionInterval;
        
        function startFaceDetection() {
            detectionInterval = setInterval(async () => {
                if (!video.videoWidth) return;
                
                const detections = await faceapi.detectSingleFace(video)
                    .withFaceLandmarks()
                    .withFaceDescriptor();
                
                if (detections) {
                    // Face detected
                    faceGuide.classList.add('valid');
                    captureBtn.disabled = false;
                    
                    // Check face quality
                    const landmarks = detections.landmarks;
                    const leftEye = landmarks.getLeftEye();
                    const rightEye = landmarks.getRightEye();
                    
                    // Simple liveness check - eyes should be visible
                    if (leftEye && rightEye && leftEye.length > 0 && rightEye.length > 0) {
                        captureBtn.style.opacity = '1';
                        hideStatus();
                    }
                    
                    capturedFaceDescriptor = detections.descriptor;
                } else {
                    faceGuide.classList.remove('valid');
                    captureBtn.disabled = true;
                    showStatus('No face detected. Please center your face.', 'warning');
                }
            }, 500);
        }
        
        function showStatus(message, type) {
            faceStatus.textContent = message;
            faceStatus.className = `status-message status-${type}`;
            faceStatus.classList.remove('hidden');
        }
        
        function hideStatus() {
            faceStatus.classList.add('hidden');
        }
        
        // Capture face
        captureBtn.addEventListener('click', async () => {
            if (!capturedFaceDescriptor) {
                showStatus('Please center your face first', 'error');
                return;
            }
            
            // Capture image
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            // Convert to blob
            const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.9));
            
            // Upload to temporary storage
            const tempFileName = `temp_faces/${Date.now()}_${Math.random()}.jpg`;
            const storageRef = storage.ref(tempFileName);
            await storageRef.put(blob);
            capturedFaceUrl = await storageRef.getDownloadURL();
            
            // Move to step 2
            step1Content.classList.add('hidden');
            step2Content.classList.remove('hidden');
            step1.classList.remove('active');
            step1.classList.add('completed');
            step2.classList.add('active');
            
            // Stop camera to save battery
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                clearInterval(detectionInterval);
            }
            
            showStatus('Face captured successfully!', 'success');
        });
        
        // Handle registration form
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const displayName = document.getElementById('displayName').value;
            const phone = document.getElementById('phone').value;
            
            if (!email || !password || !displayName) {
                showGlobalStatus('Please fill all required fields', 'error');
                return;
            }
            
            if (password.length < 6) {
                showGlobalStatus('Password must be at least 6 characters', 'error');
                return;
            }
            
            showGlobalStatus('Creating account...', 'info');
            
            try {
                // Create user in Firebase Auth
                const userCred = await auth.createUserWithEmailAndPassword(email, password);
                const user = userCred.user;
                
                // Update profile
                await user.updateProfile({
                    displayName: displayName,
                    photoURL: capturedFaceUrl
                });
                
                // Store face descriptor and additional data
                const faceDescriptorArray = Array.from(capturedFaceDescriptor);
                
                await db.collection('users').doc(user.uid).set({
                    uid: user.uid,
                    email: email,
                    displayName: displayName,
                    phone: phone || '',
                    faceUrl: capturedFaceUrl,
                    faceDescriptor: faceDescriptorArray,
                    registrationFaceUrl: capturedFaceUrl,
                    isVerified: false,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    online: true,
                    status: 'online'
                });
                
                tempUserId = user.uid;
                
                // Generate and send OTP (simulated - in production use Cloud Function)
                const otp = Math.floor(100000 + Math.random() * 900000);
                sessionStorage.setItem('tempOtp', otp);
                sessionStorage.setItem('tempUid', user.uid);
                
                console.log(`OTP for ${email}: ${otp}`);
                showGlobalStatus(`Demo OTP sent: ${otp} (Check console)`, 'success');
                
                // Move to OTP step
                step2Content.classList.add('hidden');
                step3Content.classList.remove('hidden');
                step2.classList.remove('active');
                step2.classList.add('completed');
                step3.classList.add('active');
                
                startTimer();
                
            } catch (err) {
                console.error(err);
                showGlobalStatus(handleFirebaseError(err), 'error');
            }
        });
        
        function startTimer() {
            const timerElement = document.getElementById('timer');
            timeLeft = 600;
            
            otpTimer = setInterval(() => {
                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;
                timerElement.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                
                if (timeLeft <= 0) {
                    clearInterval(otpTimer);
                    timerElement.textContent = 'Expired';
                    document.getElementById('verifyBtn').disabled = true;
                    showGlobalStatus('OTP expired. Please request a new code.', 'error');
                }
                timeLeft--;
            }, 1000);
        }
        
        // Verify OTP
        document.getElementById('verifyBtn').addEventListener('click', async () => {
            const enteredOtp = document.getElementById('otpCode').value;
            const storedOtp = sessionStorage.getItem('tempOtp');
            const tempUid = sessionStorage.getItem('tempUid');
            
            if (!enteredOtp || enteredOtp.length !== 6) {
                showGlobalStatus('Please enter the 6-digit code', 'error');
                return;
            }
            
            if (enteredOtp === storedOtp) {
                // Mark user as verified
                await db.collection('users').doc(tempUid).update({
                    isVerified: true,
                    verifiedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                clearInterval(otpTimer);
                showGlobalStatus('Registration complete! Redirecting...', 'success');
                
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 2000);
            } else {
                showGlobalStatus('Invalid OTP code. Please try again.', 'error');
            }
        });
        
        // Resend OTP
        document.getElementById('resendBtn').addEventListener('click', async () => {
            const newOtp = Math.floor(100000 + Math.random() * 900000);
            sessionStorage.setItem('tempOtp', newOtp);
            timeLeft = 600;
            clearInterval(otpTimer);
            startTimer();
            console.log(`New OTP: ${newOtp}`);
            showGlobalStatus('New OTP sent! Check console.', 'success');
        });
        
        function showGlobalStatus(message, type) {
            const statusDiv = document.getElementById('globalStatus');
            statusDiv.textContent = message;
            statusDiv.className = `status-message status-${type}`;
            statusDiv.classList.remove('hidden');
            
            setTimeout(() => {
                statusDiv.classList.add('hidden');
            }, 5000);
        }
        
        function handleFirebaseError(error) {
            switch (error.code) {
                case 'auth/email-already-in-use':
                    return 'Email already registered. Please login instead.';
                case 'auth/invalid-email':
                    return 'Invalid email address';
                case 'auth/weak-password':
                    return 'Password should be at least 6 characters';
                default:
                    return error.message || 'Registration failed. Please try again.';
            }
        }
        
        // Initialize
        loadFaceModels();
    </script>
</body>
</html>
